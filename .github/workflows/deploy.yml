name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GAR_REPOSITORY: ${{ secrets.GCP_ARTIFACT_REPOSITORY }}
  SERVICE_NAME: ${{ secrets.GCP_CLOUD_RUN_SERVICE }}
  FRONTEND_BUCKET: ${{ secrets.GCP_FRONTEND_BUCKET }}

jobs:
  # ==========================================
  # Job 1: Build & Push Docker Image
  # ==========================================
  build:
    name: Build & Push to Artifact Registry
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    outputs:
      image-sha: ${{ steps.set-image.outputs.image_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check GCP credentials
        run: |
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "ERROR: GCP_SA_KEY secret is not set!"
            echo "Go to: Settings -> Secrets and variables -> Actions -> New repository secret"
            exit 1
          fi
          echo "GCP_SA_KEY secret is configured"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Create Artifact Registry repository (if not exists)
        run: |
          gcloud artifacts repositories describe "${{ env.GAR_REPOSITORY }}" \
            --location="${{ env.GCP_REGION }}" 2>/dev/null || \
          gcloud artifacts repositories create "${{ env.GAR_REPOSITORY }}" \
            --repository-format=docker \
            --location="${{ env.GCP_REGION }}" \
            --description="AI Diff Checker Docker images"

      - name: Set image tag
        id: set-image
        run: |
          IMAGE_SHA="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/ai-diff-checker-api:${{ github.sha }}"
          echo "image_sha=${IMAGE_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.set-image.outputs.image_sha }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/ai-diff-checker-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ==========================================
  # Job 2: Deploy Backend to Cloud Run
  # ==========================================
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    environment: production
    permissions:
      contents: read
      id-token: write

    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ needs.build.outputs.image-sha }}
          flags: |
            --platform=managed
            --allow-unauthenticated
            --port=8000
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=10
            --concurrency=80
            --timeout=300s
          env_vars: |
            APP_VERSION=${{ github.sha }}
            LOG_LEVEL=INFO
            API_PORT=8000
            API_RELOAD=false
            MODEL_NAME=${{ secrets.MODEL_NAME }}
            GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}
            GOOGLE_CLOUD_LOCATION=${{ secrets.GCP_REGION }}

      - name: Verify backend health
        run: |
          echo "Waiting for service to be ready..."
          sleep 10
          curl --fail --show-error "${{ steps.deploy.outputs.url }}/health"
          echo "Backend deployed at: ${{ steps.deploy.outputs.url }}"

  # ==========================================
  # Job 3: Build & Publish Frontend to GCS
  # ==========================================
  deploy-frontend:
    name: Deploy Frontend to GCS
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Resolve frontend API URL
        id: api_url
        run: |
          API_URL="${{ secrets.FRONTEND_API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="${{ needs.deploy-backend.outputs.url }}"
          fi
          echo "Using API URL: $API_URL"
          echo "url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ steps.api_url.outputs.url }}
        run: |
          npm ci
          npm run build

      - name: Publish to GCS
        run: |
          gcloud storage rsync \
            --recursive \
            --delete-unmatched-destination-objects \
            frontend/dist "gs://${{ env.FRONTEND_BUCKET }}"
          echo "Frontend published to gs://${{ env.FRONTEND_BUCKET }}"
